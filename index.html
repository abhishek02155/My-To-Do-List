<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✅ My To-Do List</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;padding:20px}
  .app{background:#fff;border-radius:20px;padding:30px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  h1{text-align:center;font-size:26px;color:#4a4a6a;margin-bottom:6px}
  .subtitle{text-align:center;font-size:13px;color:#aaa;margin-bottom:24px}
  .input-row{display:flex;gap:10px;margin-bottom:20px}
  #taskInput{flex:1;padding:12px 16px;border:2px solid #e0e0f0;border-radius:12px;font-size:15px;outline:none;transition:.2s}
  #taskInput:focus{border-color:#667eea}
  #addBtn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:20px;cursor:pointer;transition:.2s}
  #addBtn:hover{transform:scale(1.08)}
  .filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .filter-btn{flex:1;padding:8px;border:2px solid #e0e0f0;background:#fff;border-radius:10px;font-size:13px;cursor:pointer;transition:.2s;color:#666;min-width:70px}
  .filter-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}
  .stats{display:flex;gap:10px;margin-bottom:18px}
  .stat{flex:1;background:#f7f7ff;border-radius:12px;padding:10px;text-align:center}
  .stat-num{font-size:22px;font-weight:700;color:#667eea}
  .stat-label{font-size:11px;color:#aaa;margin-top:2px}
  #taskList{list-style:none;display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto;padding-right:4px}
  #taskList::-webkit-scrollbar{width:4px}
  #taskList::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
  .task-item{display:flex;align-items:center;gap:12px;background:#f9f9ff;border-radius:12px;padding:12px 14px;border:1.5px solid #ebebff;transition:.2s;animation:slideIn .3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .task-item:hover{border-color:#c0bfff}
  .task-item.done{background:#f0fff4;border-color:#b2f5c8}
  .task-item.done .task-text{text-decoration:line-through;color:#aaa}
  .check-btn{width:28px;height:28px;border-radius:50%;border:2px solid #c0bfff;background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
  .task-item.done .check-btn{background:#48bb78;border-color:#48bb78;color:#fff}
  .task-text{flex:1;font-size:15px;color:#444;word-break:break-word}
  .edit-btn,.del-btn{border:none;background:none;font-size:17px;cursor:pointer;padding:4px;border-radius:6px;transition:.2s;flex-shrink:0}
  .edit-btn:hover{background:#fff3cd}
  .del-btn:hover{background:#fff0f0}
  .edit-input{flex:1;border:none;outline:none;background:transparent;font-size:15px;color:#444}
  .empty{text-align:center;padding:30px;color:#ccc;font-size:15px}
  .clear-btn{width:100%;margin-top:18px;padding:10px;background:none;border:1.5px dashed #f5a0a0;color:#e57373;border-radius:12px;font-size:13px;cursor:pointer;transition:.2s}
  .clear-btn:hover{background:#fff0f0}
  @media(max-width:400px){.app{padding:20px}.stats{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="app">
  <h1>✅ My To-Do List</h1>
  <p class="subtitle">Stay productive, one task at a time</p>

  <div class="input-row">
    <input id="taskInput" type="text" placeholder="Add a new task..." maxlength="120"/>
    <button id="addBtn" title="Add task">➕</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">📋 All</button>
    <button class="filter-btn" onclick="setFilter('active',this)">🔥 Active</button>
    <button class="filter-btn" onclick="setFilter('done',this)">✅ Done</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="activeCount">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" id="doneCount">0</div><div class="stat-label">Done</div></div>
  </div>

  <ul id="taskList"></ul>
  <button class="clear-btn" onclick="clearDone()">🗑️ Clear completed tasks</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks')||'[]');
  let filter = 'all';

  function save(){ localStorage.setItem('tasks', JSON.stringify(tasks)); }

  function render(){
    const list = document.getElementById('taskList');
    const filtered = tasks.filter(t =>
      filter==='all' ? true : filter==='done' ? t.done : !t.done
    );
    list.innerHTML = filtered.length ? '' : '<div class="empty">🎉 Nothing here!</div>';
    filtered.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done?' done':'');
      li.dataset.id = t.id;
      li.innerHTML = `
        <button class="check-btn" onclick="toggle('${t.id}')" title="${t.done?'Undo':'Complete'}">${t.done?'✅':'⬜'}</button>
        <span class="task-text">${t.text}</span>
        <button class="edit-btn" onclick="startEdit('${t.id}',this)" title="Edit">✏️</button>
        <button class="del-btn" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>`;
      list.appendChild(li);
    });
    document.getElementById('totalCount').textContent = tasks.length;
    document.getElementById('activeCount').textContent = tasks.filter(t=>!t.done).length;
    document.getElementById('doneCount').textContent = tasks.filter(t=>t.done).length;
  }

  function addTask(){
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if(!text) return;
    tasks.unshift({id: Date.now().toString(), text, done:false});
    save(); render();
    input.value = '';
    input.focus();
  }

  function toggle(id){
    tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
    save(); render();
  }

  function deleteTask(id){
    tasks = tasks.filter(t => t.id!==id);
    save(); render();
  }

  function startEdit(id, btn){
    const li = btn.closest('.task-item');
    const span = li.querySelector('.task-text');
    const task = tasks.find(t=>t.id===id);
    span.outerHTML = `<input class="edit-input" value="${task.text}" id="ei-${id}"/>`;
    btn.textContent = '💾';
    btn.onclick = () => saveEdit(id, btn);
    document.getElementById('ei-'+id).focus();
  }

  function saveEdit(id, btn){
    const input = document.getElementById('ei-'+id);
    const val = input.value.trim();
    if(!val) return;
    tasks = tasks.map(t => t.id===id ? {...t, text:val} : t);
    save(); render();
  }

  function clearDone(){
    tasks = tasks.filter(t=>!t.done);
    save(); render();
  }

  function setFilter(f, el){
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  document.getElementById('addBtn').onclick = addTask;
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if(e.key==='Enter') addTask();
  });

  render();
</script>
</body>
</html>
